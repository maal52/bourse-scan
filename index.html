*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e17;--card:#111827;--bdr:#1e293b;--txt:#e2e8f0;--mut:#64748b;--acc:#38bdf8;

body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;min-height:100vh;
overflow-x:hidden;-webkit-tap-highlight-color:transparent}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;
background:var(--card);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:100}
.hdr h1{font-size:15px;font-weight:700;color:var(--acc)}
.hdr .sts{font-size:10px;display:flex;gap:8px}
.hdr .st{color:var(--org);font-weight:600}.hdr .st.on{color:var(--grn)}
.tabs{display:flex;overflow-x:auto;background:var(--card);border-bottom:1px solid var(--bdr);scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:9px 12px;font-size:11px;font-weight:600;color:var(--mut);white-space:nowrap;
cursor:pointer;border-bottom:2px solid transparent;transition:.2s}
.tab.active{color:var(--acc);border-bottom-color:var(--acc)}
.panel{display:none;padding:6px}.panel.active{display:block}
.ctrl{display:flex;gap:4px;padding:6px 10px;align-items:center;flex-wrap:wrap;background:var(--dk);border-bottom:1px solid var(--bdr)}
.ctrl label{font-size:10px;color:var(--mut)}
.ctrl input[type=number]{width:40px;background:var(--card);border:1px solid var(--bdr);color:var(--txt);
border-radius:5px;padding:3px 4px;font-family:'JetBrains Mono';font-size:11px;text-align:center}
.btn{padding:5px 10px;border:none;border-radius:5px;font-size:10px;font-weight:700;cursor:pointer;font-family:'DM Sans';transition:.15s}
.btn-go{background:var(--grn);color:#fff}.btn-stop{background:var(--red);color:#fff}
.btn-sec{background:var(--bdr);color:var(--txt)}.btn-cry{background:var(--cyn);color:#000}
.btn-av{background:var(--gold);color:#000}
.info{padding:4px 10px;font-size:10px;color:var(--mut);display:flex;justify-content:space-between}
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{position:sticky;top:0;background:var(--card);color:var(--acc);font-size:9px;
text-transform:uppercase;padding:5px 6px;text-align:left;border-bottom:1px solid var(--bdr);white-space:nowrap;font-weight:700;letter-spacing:.3px}
.tbl td{padding:5px 6px;border-bottom:1px solid var(--bdr);font-family:'JetBrains Mono';font-size:10px;white-space:nowrap}
.tbl tr{transition:background .1s}.tbl tr:active{background:#1e293b}
.tbl .af{color:var(--grn);font-weight:700}.tbl .a{color:#86efac}
.tbl .n{color:var(--org)}.tbl .v{color:#fca5a5}.tbl .vf{color:var(--red);font-weight:700}
.det{background:var(--card);border-top:1px solid var(--bdr);padding:8px 10px;position:fixed;bottom:0;left:0;right:0;
max-height:42vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s;z-index:90}
.det.open{transform:translateY(0)}
.det h3{font-size:12px;color:var(--acc);margin-bottom:4px}
.det .close{position:absolute;top:6px;right:10px;background:none;border:none;color:var(--mut);font-size:16px;cursor:pointer}
.sig-row{display:flex;align-items:center;padding:2px 0;font-size:10px;gap:6px}
.sig-row .ind{width:60px;font-weight:600;color:var(--txt)}
.sig-row .badge{padding:1px 5px;border-radius:6px;font-size:9px;font-weight:700}
.sig-row .badge.b{background:#22c55e22;color:var(--grn)}.sig-row .badge.s{background:#ef444422;color:var(--red)}
.sig-row .badge.n{background:#f59e0b22;color:var(--org)}
.sig-row .dots{color:var(--mut);font-size:9px;width:28px}.sig-row .reason{color:var(--mut);font-size:9px}
.chk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:1px;padding:3px 0;max-height:45vh;overflow-y:auto}
.chk-grid label{display:flex;align-items:center;gap:3px;font-size:10px;color:#94a3b8;padding:2px 3px;cursor:pointer}
.chk-grid input{accent-color:var(--acc)}

@keyframes flash{0%,100%{opacity:1}50%{opacity:.3}}.flash{animation:flash .6s 3}

// ═══════════════════════════════════════════════════════════════
//  DATA FETCHERS — Yahoo Finance + Morningstar
// ═══════════════════════════════════════════════════════════════
const PROXIES=[u=>`https://corsproxy.io/?url=${encodeURIComponent(u)}`,u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`];
let pIdx=0;

async function fetchYF(ticker,period='6mo'){
  const url=`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?range=${period}&interval=1d`;
  for(let a=0;a<PROXIES.length;a++){try{
    const r=await fetch(PROXIES[(pIdx+a)%PROXIES.length](url),{signal:AbortSignal.timeout(15000)});
    if(!r.ok)continue;const j=await r.json(),res=j.chart?.result?.[0];if(!res?.timestamp)continue;
    pIdx=(pIdx+a)%PROXIES.length;const ts=res.timestamp,q=res.indicators.quote[0],data=[];
    for(let i=0;i<ts.length;i++)if(q.close[i]!=null&&q.high[i]!=null)
      data.push({t:ts[i],o:q.open[i],h:q.high[i],l:q.low[i],c:q.close[i],v:q.volume[i]||0});
    return data.length>=20?data:null;
  }catch(e){continue;}}return null;
}

async function fetchMorningstar(isin){
  const sd=new Date(Date.now()-200*864e5).toISOString().split('T')[0];
  const url=`https://tools.morningstar.co.uk/api/rest.svc/timeseries_price/t92wz0sj7c?currencyId=EUR&idtype=ISIN&frequency=daily&startDate=${sd}&outputType=COMPACTJSON&id=${isin}`;
  for(let a=0;a<PROXIES.length;a++){try{
    const r=await fetch(PROXIES[(pIdx+a)%PROXIES.length](url),{signal:AbortSignal.timeout(12000)});
    if(!r.ok)continue;const j=await r.json();if(!Array.isArray(j)||j.length<20)continue;
    pIdx=(pIdx+a)%PROXIES.length;
    return j.map(([ts,cl])=>({t:ts/1000,o:cl,h:cl,l:cl,c:cl,v:0,partial:true}));
  }catch(e){continue;}}return null;
}

// smartFetch : Yahoo d'abord, Morningstar en fallback pour OPCVM
async function smartFetch(ticker,isin,isOPCVM){
  let d=await fetchYF(ticker);
  if(d)return d;
  if(isOPCVM&&isin){d=await fetchMorningstar(isin);if(d)return d;}
  return null;
}

function sma(a,p){return a.map((_,i)=>i<p-1?null:a.slice(i-p+1,i+1).reduce((s,v)=>s+v,0)/p);}
function ema(a,p){const k=2/(p+1),r=[a[0]];for(let i=1;i<a.length;i++)r.push(a[i]*k+r[i-1]*(1-k));return r;}
function calcRSI(c,p=14){const r=new Array(c.length).fill(null),g=[],l=[];
for(let i=1;i<c.length;i++){const d=c[i]-c[i-1];g.push(d>0?d:0);l.push(d<0?-d:0);}
if(g.length<p)return r;let ag=g.slice(0,p).reduce((a,b)=>a+b,0)/p,al=l.slice(0,p).reduce((a,b)=>a+b,0)/p;
r[p]=al===0?100:100-100/(1+ag/al);for(let i=p;i<g.length;i++){ag=(ag*(p-1)+g[i])/p;al=(al*(p-1)+l[i])/p;r[i+1]=al===0?100:100-100/(1+ag/al);}return r;}
function calcMACD(c){const e12=ema(c,12),e26=ema(c,26),ml=e12.map((v,i)=>v-e26[i]),sig=ema(ml,9),h=ml.map((v,i)=>v-sig[i]);return{ml,sig,h};}
function calcBoll(c,p=20,k=2){const m=sma(c,p);return c.map((_c,i)=>{if(m[i]==null)return{u:null,l:null};const sl=c.slice(i-p+1,i+1),std=Math.sqrt(sl.reduce((a,v)=>a+(v-m[i])**2,0)/p);return{u:m[i]+k*std,l:m[i]-k*std};});}
function calcStoch(h,l,c,kp=14){return c.map((_c,i)=>{if(i<kp-1)return null;const sl=l.slice(i-kp+1,i+1),sh=h.slice(i-kp+1,i+1);const lo=Math.min(...sl),hi=Math.max(...sh);return hi===lo?50:(_c-lo)/(hi-lo)*100;});}
function calcOBV(c,v){const o=[0];for(let i=1;i<c.length;i++){if(c[i]>c[i-1])o.push(o[i-1]+v[i]);else if(c[i]<c[i-1])o.push(o[i-1]-v[i]);else o.push(o[i-1]);}return o;}
function calcSupertrend(h,l,c,p=10,m=3){const n=c.length,tr=h.map((hv,i)=>i===0?hv-l[i]:Math.max(hv-l[i],Math.abs(hv-c[i-1]),Math.abs(l[i]-c[i-1])));
const atr=new Array(n).fill(null);for(let i=p-1;i<n;i++)atr[i]=tr.slice(i-p+1,i+1).reduce((a,b)=>a+b,0)/p;
const ub=new Float64Array(n),lb=new Float64Array(n),dir=new Array(n).fill(0);
for(let i=0;i<n;i++){const hl=(h[i]+l[i])/2;ub[i]=hl+m*(atr[i]||0);lb[i]=hl-m*(atr[i]||0);}
for(let i=p;i<n;i++){if(i===p){dir[i]=-1;continue;}if(dir[i-1]===1){lb[i]=Math.max(lb[i],lb[i-1]);dir[i]=c[i]<lb[i]?-1:1;}
else{ub[i]=Math.min(ub[i],ub[i-1]);dir[i]=c[i]>ub[i]?1:-1;}}return dir;}
function calcADX(h,l,c,p=14){const n=c.length,pDM=new Float64Array(n),nDM=new Float64Array(n),tr=new Float64Array(n);
for(let i=1;i<n;i++){const ph=h[i]-h[i-1],nl=l[i-1]-l[i];pDM[i]=ph>nl&&ph>0?ph:0;nDM[i]=nl>ph&&nl>0?nl:0;
tr[i]=Math.max(h[i]-l[i],Math.abs(h[i]-c[i-1]),Math.abs(l[i]-c[i-1]));}
const sm=(a,p)=>{const r=new Float64Array(a.length);let s=0;for(let i=1;i<=p;i++)s+=a[i];r[p]=s;for(let i=p+1;i<a.length;i++)r[i]=r[i-1]-r[i-1]/p+a[i];return r;};
const sTR=sm(tr,p),sPDM=sm(pDM,p),sNDM=sm(nDM,p);const pDI=sPDM.map((v,i)=>sTR[i]?100*v/sTR[i]:0),nDI=sNDM.map((v,i)=>sTR[i]?100*v/sTR[i]:0);
const dx=pDI.map((v,i)=>{const s=v+nDI[i];return s?100*Math.abs(v-nDI[i])/s:0;});return{adx:sm(dx,p),pDI,nDI};}
function calcIchimoku(h,l,c){const n=c.length,hh=(a,p,i)=>{let m=-Infinity;for(let j=Math.max(0,i-p+1);j<=i;j++)m=Math.max(m,a[j]);return m;},
ll=(a,p,i)=>{let m=Infinity;for(let j=Math.max(0,i-p+1);j<=i;j++)m=Math.min(m,a[j]);return m;};const L=n-1;if(n<52)return{above:false,below:false,tkCross:false};
const tk=(hh(h,9,L)+ll(l,9,L))/2,kj=(hh(h,26,L)+ll(l,26,L))/2,sa=(tk+kj)/2,sb=(hh(h,52,L)+ll(l,52,L))/2;
return{above:c[L]>Math.max(sa,sb),below:c[L]<Math.min(sa,sb),tkCross:tk>kj};}
function calcFibo(h,l,c){const hi=Math.max(...h),lo=Math.min(...l),d=hi-lo;
return{f382:hi-.382*d,f50:hi-.5*d,f618:hi-.618*d,f786:hi-.786*d,price:c[c.length-1]};}
function calcPSAR(h,l,c){const n=c.length,psar=new Float64Array(n),trend=new Float64Array(n),ep=new Float64Array(n),af=new Float64Array(n);
psar[0]=l[0];ep[0]=h[0];af[0]=.02;trend[0]=1;
for(let i=1;i<n;i++){if(trend[i-1]===1){psar[i]=psar[i-1]+af[i-1]*(ep[i-1]-psar[i-1]);
psar[i]=Math.min(psar[i],l[i-1],l[Math.max(0,i-2)]);
if(l[i]<psar[i]){trend[i]=-1;psar[i]=ep[i-1];ep[i]=l[i];af[i]=.02;}
else{trend[i]=1;ep[i]=Math.max(ep[i-1],h[i]);af[i]=ep[i]>ep[i-1]?Math.min(af[i-1]+.02,.2):af[i-1];}}
else{psar[i]=psar[i-1]+af[i-1]*(ep[i-1]-psar[i-1]);psar[i]=Math.max(psar[i],h[i-1],h[Math.max(0,i-2)]);
if(h[i]>psar[i]){trend[i]=1;psar[i]=ep[i-1];ep[i]=h[i];af[i]=.02;}
else{trend[i]=-1;ep[i]=Math.min(ep[i-1],l[i]);af[i]=ep[i]<ep[i-1]?Math.min(af[i-1]+.02,.2):af[i-1];}}}return trend;}

// ═══════════════════════════════════════════════════════════════
//  ANALYSE — Triple profil de seuils
// ═══════════════════════════════════════════════════════════════
// profile: 'stock' | 'crypto' | 'opcvm'
function analyze(data,profile='stock'){
  if(!data||data.length<55)return null;
  const c=data.map(d=>d.c),h=data.map(d=>d.h),l=data.map(d=>d.l),v=data.map(d=>d.v);
  const L=c.length-1,P=L-1;
  const isPartial=!!data[0].partial; // OPCVM sans H/L/V
  const sigs=[];

  // Triple profil de seuils
  const T=profile==='crypto'?{rsiOB:80,rsiOS:20,stochOB:85,stochOS:15,bollK:2.5,adxS:30,
    fat1:30,fat2:20,fatR1:70,fatR2:65,fatB1:-30,fatB2:-20,fatBR1:30,fatBR2:35,obvW:1,
    ctxR:70,ctxSt:75,ctxP:20,ctxOR:30,ctxOSt:25,ctxOP:-20,adxFa:50,adxFr:75,
    macdW:2,rsiW:2,fiboKey:'f786'}
  :profile==='opcvm'?{rsiOB:65,rsiOS:35,stochOB:75,stochOS:25,bollK:1.8,adxS:22,
    fat1:8,fat2:5,fatR1:55,fatR2:50,fatB1:-8,fatB2:-5,fatBR1:42,fatBR2:45,obvW:0,
    ctxR:55,ctxSt:65,ctxP:5,ctxOR:42,ctxOSt:35,ctxOP:-5,adxFa:35,adxFr:58,
    macdW:3,rsiW:3,fiboKey:'f50'}
  :{rsiOB:70,rsiOS:30,stochOB:80,stochOS:20,bollK:2.0,adxS:25,
    fat1:15,fat2:10,fatR1:60,fatR2:55,fatB1:-15,fatB2:-10,fatBR1:40,fatBR2:45,obvW:2,
    ctxR:60,ctxSt:70,ctxP:10,ctxOR:40,ctxOSt:30,ctxOP:-10,adxFa:40,adxFr:65,
    macdW:2,rsiW:2,fiboKey:'f618'};

  // 1. RSI
  const rsiArr=calcRSI(c);const rv=rsiArr[L];
  if(rv!=null){if(rv<T.rsiOS)sigs.push(["RSI","ACHAT",T.rsiW,`Survente (${rv.toFixed(0)})`]);
  else if(rv>T.rsiOB)sigs.push(["RSI","VENTE",T.rsiW,`Surachat (${rv.toFixed(0)})`]);
  else sigs.push(["RSI","NEUTRE",0,rv.toFixed(0)]);}
  // 2. MACD
  const{ml,sig:ms,h:mh}=calcMACD(c);
  if(ml[L]!=null&&ml[P]!=null){
  if(ml[P]<ms[P]&&ml[L]>ms[L])sigs.push(["MACD","ACHAT",T.macdW,"Cross haussier"]);
  else if(ml[P]>ms[P]&&ml[L]<ms[L])sigs.push(["MACD","VENTE",T.macdW,"Cross baissier"]);
  else if(ml[L]>ms[L])sigs.push(["MACD","ACHAT",1,"MACD>Sig"]);
  else sigs.push(["MACD","VENTE",1,"MACD<Sig"]);}
  // 3. Bollinger
  const boll=calcBoll(c,20,T.bollK);const bl=boll[L];
  if(bl.u!=null){if(c[L]>bl.u)sigs.push(["Boll.","VENTE",1,`>${T.bollK}σ`]);
  else if(c[L]<bl.l)sigs.push(["Boll.","ACHAT",1,`<${T.bollK}σ`]);
  else sigs.push(["Boll.","NEUTRE",0,"OK"]);}
  // 4. SMA
  const s20=sma(c,20),s50=sma(c,50);
  if(s20[L]!=null&&s50[L]!=null){
  if(s20[P]<s50[P]&&s20[L]>s50[L])sigs.push(["SMA","ACHAT",3,"Golden Cross"]);
  else if(s20[P]>s50[P]&&s20[L]<s50[L])sigs.push(["SMA","VENTE",3,"Death Cross"]);
  else if(s20[L]>s50[L])sigs.push(["SMA","ACHAT",1,"20>50"]);
  else sigs.push(["SMA","VENTE",1,"20<50"]);}
  // 5. Fibonacci
  const fib=calcFibo(h,l,c);const fibKey=fib[T.fiboKey];
  if(fib.price<=fibKey)sigs.push(["Fibo","ACHAT",2,`<${T.fiboKey.replace('f','')}`]);
  else if(fib.price<=fib.f382)sigs.push(["Fibo","ACHAT",1,"38-50%"]);
  else sigs.push(["Fibo","NEUTRE",0,">38%"]);

  // ── Indicateurs nécessitant H/L/V (skip si partiel OPCVM) ──
  let skv=null,adxV=0;
  if(!isPartial){
    // 6. Stochastique
    const sk=calcStoch(h,l,c);skv=sk[L];
    if(skv!=null){if(skv<T.stochOS)sigs.push(["Stoch.","ACHAT",1,`Surv(${skv.toFixed(0)})`]);
    else if(skv>T.stochOB)sigs.push(["Stoch.","VENTE",1,`Sura(${skv.toFixed(0)})`]);
    else sigs.push(["Stoch.","NEUTRE",0,skv.toFixed(0)]);}
    // 7. Supertrend
    const st=calcSupertrend(h,l,c);
    if(st[L])sigs.push(["SuperT",st[L]===1?"ACHAT":"VENTE",2,st[L]===1?"Haussier":"Baissier"]);
    // 8. OBV
    if(T.obvW>0){const ob=calcOBV(c,v);if(data.length>5){const ot=ob[L]-ob[L-5],pt=c[L]-c[L-5];
    if(ot>0&&pt<0)sigs.push(["OBV","ACHAT",T.obvW,"Div.hauss."]);
    else if(ot<0&&pt>0)sigs.push(["OBV","VENTE",T.obvW,"Div.baiss."]);
    else if(ot>0)sigs.push(["OBV","ACHAT",1,"Vol↑"]);else sigs.push(["OBV","VENTE",1,"Vol↓"]);}}
    // 9. ADX
    const{adx:adxArr,pDI,nDI}=calcADX(h,l,c);adxV=adxArr[L];
    if(adxV>0){if(adxV>T.adxS)sigs.push(["ADX",pDI[L]>nDI[L]?"ACHAT":"VENTE",2,`Fort(${adxV.toFixed(0)})`]);
    else sigs.push(["ADX","NEUTRE",0,`Range(${adxV.toFixed(0)})`]);}
    // 10. Ichimoku
    const ich=calcIchimoku(h,l,c);
    if(ich.above&&ich.tkCross)sigs.push(["Ichi.","ACHAT",2,">nuage+TK"]);
    else if(ich.below&&!ich.tkCross)sigs.push(["Ichi.","VENTE",2,"<nuage"]);
    else if(ich.above)sigs.push(["Ichi.","ACHAT",1,">nuage"]);
    else if(ich.below)sigs.push(["Ichi.","VENTE",1,"<nuage"]);
    else sigs.push(["Ichi.","NEUTRE",0,"Nuage"]);
    // 11. PSAR
    const psar=calcPSAR(h,l,c);
    sigs.push(["PSAR",psar[L]===1?"ACHAT":"VENTE",1,psar[L]===1?"Haussier":"Baissier"]);
  }
  // 12. Fatigue (toujours calculable)
  const perf1m=data.length>=22?(c[L]/c[L-21]-1)*100:0;
  if(perf1m>T.fat1&&rv>T.fatR1)sigs.push(["Fatigue","VENTE",3,`+${perf1m.toFixed(0)}%/1m`]);
  else if(perf1m>T.fat2&&rv>T.fatR2)sigs.push(["Fatigue","VENTE",2,`+${perf1m.toFixed(0)}%/1m tendu`]);
  else if(perf1m<T.fatB1&&rv<T.fatBR1)sigs.push(["Fatigue","ACHAT",3,`${perf1m.toFixed(0)}%/1m survendu`]);
  else if(perf1m<T.fatB2&&rv<T.fatBR2)sigs.push(["Fatigue","ACHAT",2,`${perf1m.toFixed(0)}%/1m opportunité`]);
  else sigs.push(["Fatigue","NEUTRE",0,`${perf1m>=0?'+':''}${perf1m.toFixed(0)}%/1m`]);

  // Scoring contextuel
  const trendInd=["SMA","SuperT","Ichi.","PSAR","ADX"];
  const isOB=rv>T.ctxR&&(skv==null||skv>T.ctxSt)&&perf1m>T.ctxP;
  const isOS=rv<T.ctxOR&&(skv==null||skv<T.ctxOSt)&&perf1m<T.ctxOP;
  const isAdxF=adxV>T.adxFa&&rv>T.adxFr;
  let sc=0,mx=0;
  for(const[name,sig,str]of sigs){let es=str;
    if(isOB&&sig==="ACHAT"&&trendInd.includes(name))es=Math.max(1,Math.round(str/2));
    if(isAdxF&&sig==="ACHAT"&&name!=="Fatigue")es=Math.max(1,Math.round(str*0.6));
    if(isOS&&sig==="VENTE"&&trendInd.includes(name))es=Math.max(1,Math.round(str/2));
    mx+=es;if(sig==="ACHAT")sc+=es;else if(sig==="VENTE")sc-=es;}
  const pct=mx?sc/mx*100:0;let verdict;
  if(pct>40)verdict="ACHAT FORT";else if(pct>15)verdict="ACHAT";
  else if(pct>-15)verdict="NEUTRE";else if(pct>-40)verdict="VENTE";else verdict="VENTE FORTE";
  return{sigs,score:pct,verdict,close:c[L],prev:c[P],rsi:rv,adx:adxV,perf1m,partial:isPartial};
}

  document.getElementById('cntC').textContent=`${all.length}`;
  refreshGlobal();if(all.some(r=>Math.abs(r.a.score)>=60))playAlert();}

async function scanAV(){
  const etfs=getSel('avetf',AV_ETF);const opcs=getSel('avopc',AV_OPCVM);
  const total=etfs.length+opcs.length;if(!total)return;
  document.getElementById('infoA').textContent=`Scan AV (${total})…`;
  const all=[];
  // ETF Spirit 2 — Yahoo Finance, profil stock
  for(const it of etfs){const d=await fetchYF(it.ticker);if(!d)continue;
  const a=analyze(d,'stock');if(a)all.push({name:it.name,ticker:it.ticker,cat:'ETF AV',a});}
  // OPCVM Spirit 2 — smartFetch (Yahoo+Morningstar), profil opcvm
  for(const it of opcs){const d=await smartFetch(it.ticker,it.ticker,true);if(!d)continue;
  const a=analyze(d,'opcvm');if(a)all.push({name:it.name,ticker:it.ticker,cat:'OPCVM',a});}
  avRes=all.sort((a,b)=>b.a.score-a.a.score);
  renderTbl('tblA',avRes,'av');
  document.getElementById('infoA').textContent=`AV — ${now()}`;document.getElementById('infoA').style.color='var(--grn)';
  document.getElementById('cntA').textContent=`${all.length}`;
  refreshGlobal();if(all.some(r=>Math.abs(r.a.score)>=60))playAlert();}

function refreshGlobal(){
  const merged=[...stockRes,...cryptoRes,...avRes].sort((a,b)=>b.a.score-a.a.score);
  renderTbl('tblG',merged,'global');
  document.getElementById('infoG').textContent=`Global — ${now()}`;document.getElementById('infoG').style.color='var(--grn)';
  document.getElementById('cntG').textContent=`${merged.length}`;}

// Loops
function startStock(){if(sRun)return;sRun=true;document.getElementById('stS').textContent='Act🟢';document.getElementById('stS').classList.add('on');document.getElementById('bSS').disabled=false;
(async function loop(){if(!sRun)return;await scanStocks();const iv=parseInt(document.getElementById('intvS').value)||15;sT=setTimeout(loop,iv*6e4);})();}
function stopStock(){sRun=false;clearTimeout(sT);document.getElementById('stS').textContent='Act⏸';document.getElementById('stS').classList.remove('on');document.getElementById('bSS').disabled=true;}
function startCrypto(){if(cRun)return;cRun=true;document.getElementById('stC').textContent='Cry🟢';document.getElementById('stC').classList.add('on');document.getElementById('bSC').disabled=false;
(async function loop(){if(!cRun)return;await scanCryptos();const iv=parseInt(document.getElementById('intvC').value)||15;cT=setTimeout(loop,iv*6e4);})();}
function stopCrypto(){cRun=false;clearTimeout(cT);document.getElementById('stC').textContent='Cry⏸';document.getElementById('stC').classList.remove('on');document.getElementById('bSC').disabled=true;}
function startAV(){if(aRun)return;aRun=true;document.getElementById('stA').textContent='AV🟢';document.getElementById('stA').classList.add('on');document.getElementById('bSA').disabled=false;
(async function loop(){if(!aRun)return;await scanAV();const iv=parseInt(document.getElementById('intvA').value)||30;aT=setTimeout(loop,iv*6e4);})();}
function stopAV(){aRun=false;clearTimeout(aT);document.getElementById('stA').textContent='AV⏸';document.getElementById('stA').classList.remove('on');document.getElementById('bSA').disabled=true;}
function scanAll(){scanStocks();scanCryptos();scanAV();}

// PWA
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').then(reg=>{
if('periodicSync' in reg)reg.periodicSync.register('scan-stocks',{minInterval:9e5}).catch(()=>{});});
navigator.serviceWorker.addEventListener('message',e=>{if(e.data?.type==='background-scan-trigger')scanAll();});}
setInterval(()=>{},25000); // keep-alive
</script>
